# ==============================================================
# Hatsik — CI/CD Pipeline
# ==============================================================
# Lint → Test → Build Docker → Push to Lightsail → Deploy
# ==============================================================

name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  LIGHTSAIL_SERVICE: ${{ secrets.LIGHTSAIL_SERVICE }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hatsik_test
          POSTGRES_USER: hatsik
          POSTGRES_PASSWORD: hatsik
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements/local.txt

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: "False"
          ALLOWED_HOSTS: localhost
          DATABASE_URL: postgres://hatsik:hatsik@localhost:5432/hatsik_test
          RESEND_API_KEY: ""
          INTERNAL_CRON_TOKEN: test-token
          DJANGO_SETTINGS_MODULE: config.settings.local
        run: python -m pytest

  build-and-deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Lightsail plugin
        run: |
          curl -s "https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl" -o /usr/local/bin/lightsailctl
          chmod +x /usr/local/bin/lightsailctl

      - name: Build Docker image
        run: docker build --platform linux/amd64 --provenance=false -t hatsik:latest .

      - name: Push image to Lightsail
        run: |
          aws lightsail push-container-image \
            --region ${{ env.AWS_REGION }} \
            --service-name ${{ env.LIGHTSAIL_SERVICE }} \
            --label latest \
            --image hatsik:latest

      - name: Get pushed image name
        id: image
        run: |
          IMAGE=$(aws lightsail get-container-images \
            --service-name ${{ env.LIGHTSAIL_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            --query 'containerImages[0].image' \
            --output text)
          echo "name=$IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy to Lightsail
        run: |
          aws lightsail create-container-service-deployment \
            --region ${{ env.AWS_REGION }} \
            --service-name ${{ env.LIGHTSAIL_SERVICE }} \
            --containers "{
              \"hatsik\": {
                \"image\": \"${{ steps.image.outputs.name }}\",
                \"ports\": {\"8000\": \"HTTP\"},
                \"environment\": {
                  \"DJANGO_SETTINGS_MODULE\": \"config.settings.production\",
                  \"SECRET_KEY\": \"${{ secrets.SECRET_KEY }}\",
                  \"DEBUG\": \"False\",
                  \"ALLOWED_HOSTS\": \"${{ secrets.ALLOWED_HOSTS }}\",
                  \"DATABASE_URL\": \"${{ secrets.DATABASE_URL }}\",
                  \"RESEND_API_KEY\": \"${{ secrets.RESEND_API_KEY }}\",
                  \"RESEND_FROM_DOMAIN\": \"${{ secrets.RESEND_FROM_DOMAIN }}\",
                  \"INTERNAL_CRON_TOKEN\": \"${{ secrets.INTERNAL_CRON_TOKEN }}\"
                }
              }
            }" \
            --public-endpoint "{
              \"containerName\": \"hatsik\",
              \"containerPort\": 8000,
              \"healthCheck\": {
                \"path\": \"/login/\",
                \"intervalSeconds\": 15,
                \"timeoutSeconds\": 5,
                \"healthyThreshold\": 2,
                \"unhealthyThreshold\": 3
              }
            }"
