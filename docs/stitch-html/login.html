<body class="min-h-screen flex flex-col items-center justify-center p-margin-mobile">
<!-- Main Container -->
<main class="w-full max-w-[420px] bg-surface-container-lowest rounded-[24px] p-xl flex flex-col items-center gap-xl">
<!-- Logo Section -->
<div class="flex flex-col items-center gap-md">
<div class="w-24 h-24 overflow-hidden rounded-xl">
<img alt="Hatsik Logo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBD_YDa50roOC5irtilxu1aSNslq8agYicmnJduXQc79iB6bpGwGXgwM28NvbT_kTzD47CitDdXhQVmvAE6LZU8RVO7rxo4ZdrpZI3HDOwLsao9orBK-gP6mWQWWvPKJlcIoawHJxvlgTNAsRPm-usLYxPE02WcOfxGZzplSQhkrzy2OD0VqYmQLqoTQEQqAa5KM-kXddlf5Mo__Z0TAUTRV4mbvZxoF8Bo4ep2qFUxVMTzkpbeZhXUt7bdS1kamHMTbxxobq9z-ha3">
</div>
<div class="text-center">
<h1 class="font-headline-lg text-headline-lg text-on-surface">Bienvenido a Hatsik</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Logística colaborativa hecha fácil.</p>
</div>
</div>
<!-- Form Section -->
<form class="w-full flex flex-col gap-lg" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface-variant px-sm" for="email">Correo electrónico</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">mail</span>
<input class="hatsik-input w-full pl-12 pr-4 py-3.5 bg-surface-container-low border border-gray-border rounded-full font-body-md text-body-md focus:outline-none placeholder:text-gray-muted" id="email" placeholder="nombre@ejemplo.com" type="email">
</div>
</div>
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface-variant px-sm" for="password">Contraseña</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
<input class="hatsik-input w-full pl-12 pr-12 py-3.5 bg-surface-container-low border border-gray-border rounded-full font-body-md text-body-md focus:outline-none placeholder:text-gray-muted" id="password" placeholder="••••••••" type="password">
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<div class="flex justify-end px-sm">
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">¿Olvidaste tu contraseña?</a>
</div>
</div>
<button class="btn-active-state w-full py-4 bg-primary text-on-primary font-headline-md text-headline-md rounded-full shadow-sm hover:bg-primary-container transition-all flex items-center justify-center gap-sm" type="submit">
                Entrar
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="w-full flex items-center gap-md">
<div class="h-[1px] flex-1 bg-gray-border"></div>
<span class="font-caption text-caption text-gray-muted">O</span>
<div class="h-[1px] flex-1 bg-gray-border"></div>
</div>
<!-- Social/Secondary Section -->
<div class="w-full flex flex-col gap-md">
<button class="btn-active-state w-full py-3 bg-surface-container-lowest border border-gray-border text-on-surface font-body-lg text-body-lg rounded-full flex items-center justify-center gap-md hover:bg-surface-container-low transition-all">

                Continuar con Google

<footer class="mt-xl text-center">
<div class="flex items-center gap-xs text-on-surface-variant opacity-60">
<span class="material-symbols-outlined text-[18px]">favorite</span>
<span class="font-caption text-caption">Organiza con cariño</span>
</div>
</footer>
<script>
        // Simple micro-interaction for password visibility toggle
        const toggleBtn = document.querySelector('button[type="button"]');
        const passInput = document.getElementById('password');
        const icon = toggleBtn.querySelector('.material-symbols-outlined');

        toggleBtn.addEventListener('click', () => {
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                passInput.type = 'password';
                icon.textContent = 'visibility';
            }
        });

        // Atmosphere effect: subtle parallax on the card
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('main');
            const { clientX, clientY } = e;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            const moveX = (clientX - centerX) / 100;
            const moveY = (clientY - centerY) / 100;
            
            card.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
