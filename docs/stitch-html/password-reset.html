        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-interaction:active {

<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-margin-mobile">
<!-- The Shell Visibility & Relevance: Suppression of Nav bars as this is a focused Journey -->
<main class="w-full max-w-[440px] animate-in fade-in zoom-in duration-500">
<!-- Logo Header -->
<div class="flex flex-col items-center mb-xl">
<div class="mb-md">
<span class="font-display-logo text-display-logo text-primary tracking-tight">hatsik</span>
</div>
</div>
<!-- Centralized Card -->
<div class="bg-surface-container-lowest border border-gray-border rounded-card p-lg md:p-xl shadow-sm relative overflow-hidden">
<!-- Subtle Decorative Element (Kitchen Board feel) -->
<div class="absolute top-0 left-0 w-full h-1 bg-primary-container opacity-10"></div>
<div class="flex flex-col gap-lg">
<!-- Title & Subtext -->
<div class="text-center space-y-md">
<h1 class="font-headline-md text-headline-md text-on-surface">Recupera tu contraseña</h1>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">
                        No te preocupes, nos pasa a todos. Ingresa tu correo y te enviaremos un enlace para restablecerla.
                    </p>
</div>
<!-- Recovery Form -->
<form class="flex flex-col gap-lg" onsubmit="event.preventDefault(); return false;">
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface px-unit" for="email">Correo electrónico</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-gray-muted group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="mail">mail</span>
</div>
<input class="w-full pl-xl pr-md py-md bg-surface border border-gray-border rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary-container focus:border-primary outline-none transition-all duration-200" id="email" name="email" placeholder="tu@email.com" required="" type="email">
</div>
</div>
<!-- Primary Action -->
<button class="bg-primary hover:bg-secondary text-on-primary font-body-lg text-body-lg py-md rounded-button shadow-sm active-interaction transition-all flex items-center justify-center gap-sm group" type="submit">
<span>Enviar enlace</span>
<span class="material-symbols-outlined transition-transform group-hover:translate-x-1" data-icon="send">send</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-md py-sm">
<div class="flex-grow h-px bg-gray-border"></div>
<span class="font-caption text-caption text-gray-muted">o</span>
<div class="flex-grow h-px bg-gray-border"></div>
</div>
<!-- Secondary Action -->
<div class="text-center">
<a class="inline-flex items-center gap-xs font-body-md text-body-md text-primary hover:text-secondary hover:underline transition-colors active-interaction" href="#">
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_back">arrow_back</span>
                        Volver al inicio de sesión
                    </a>
</div>
</div>
</div>
<!-- Atmospheric Footer (Kitchen Table aesthetic) -->
<div class="mt-xl grid grid-cols-3 gap-lg opacity-40">
<div class="h-16 rounded-xl border border-dashed border-gray-border flex items-center justify-center">
<span class="material-symbols-outlined text-gray-muted" data-icon="restaurant_menu">restaurant_menu</span>
</div>
<div class="h-16 rounded-xl border border-dashed border-gray-border flex items-center justify-center">
<span class="material-symbols-outlined text-gray-muted" data-icon="groups">groups</span>
</div>
<div class="h-16 rounded-xl border border-dashed border-gray-border flex items-center justify-center">
<span class="material-symbols-outlined text-gray-muted" data-icon="celebration">celebration</span>
</div>
</div>
</main>
<!-- Background Decoration -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute -top-20 -right-20 w-64 h-64 bg-coral-soft rounded-full opacity-30 blur-3xl"></div>
<div class="absolute -bottom-20 -left-20 w-96 h-96 bg-primary-container opacity-5 blur-3xl"></div>
</div>
<script>
        // Simple micro-interaction for button state
        document.querySelector('form').addEventListener('submit', function() {
            const btn = this.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span> <span>¡Enviado!</span>';
                btn.classList.remove('bg-primary');
                btn.classList.add('bg-state-covered');
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('bg-state-covered', 'opacity-80', 'cursor-not-allowed');
                    btn.classList.add('bg-primary');
                }, 3000);
            }, 1500);
        });
    </script>
