<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }
        .strength-bar {
            height: 4px;
            transition: all 0.3s ease;
        }
    </style>

<body class="min-h-screen flex items-center justify-center p-margin-mobile">
<main class="w-full max-w-[440px] animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-xl">
<img alt="hatsik logo" class="h-16 mb-sm object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAZ6EUpzvF-Vntd-yxvXkN4l52J8kF69RLkA0KYkgC8t7nb_e9OQTw36KfN2fd-tXSlqk-_W9acuKO3mfDXmXttYIQQWuSG8T92knnQWO_CLDoIzvWC0UoaPRT41-j4cPPTKKy3EbEHuz53vajNfxHlqXQruPvNc5BexYGuS1-2GF7MOKqt5iD1LXSKQcin9N2fggntKwBz4777L9iN2EnGvECEuAumXvc2POXwMTSPrxiumiZYB6zJXhbMv9cqb7UtBe69AWM3x2Gz">
</div>
<!-- Registration Card -->
<div class="bg-surface-container-lowest border border-gray-border rounded-2xl p-lg md:p-xl shadow-sm">
<header class="mb-xl text-center">
<h1 class="font-headline-md text-headline-md text-on-surface mb-xs">Crea tu cuenta</h1>
<p class="font-body-md text-body-md text-gray-muted">Únete a la mejor forma de organizar convivios.</p>
</header>
<form class="space-y-lg" id="registration-form">
<!-- Name Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block" for="name">Nombre de pantalla</label>
<div class="relative">
<input class="w-full px-lg py-md bg-surface-container-low border border-gray-border rounded-input text-body-md focus:outline-none focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all" id="name" placeholder="Ej. Juan Pérez" required="" type="text">
</div>
</div>
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block" for="email">Correo electrónico</label>
<div class="relative">
<input class="w-full px-lg py-md bg-surface-container-low border border-gray-border rounded-input text-body-md focus:outline-none focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all" id="email" placeholder="tu@correo.com" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block" for="password">Contraseña</label>
<div class="relative group">
<input class="w-full px-lg py-md bg-surface-container-low border border-gray-border rounded-input text-body-md focus:outline-none focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all" id="password" oninput="updateStrength(this.value)" placeholder="••••••••" required="" type="password">
<button class="absolute right-md top-1/2 -translate-y-1/2 text-gray-muted hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="password-toggle-icon">visibility</span>
</button>
</div>
<!-- Strength Indicator -->
<div class="pt-xs">
<div class="flex gap-1 mb-xs">
<div class="strength-bar flex-1 rounded-full bg-gray-border" id="strength-1"></div>
<div class="strength-bar flex-1 rounded-full bg-gray-border" id="strength-2"></div>
<div class="strength-bar flex-1 rounded-full bg-gray-border" id="strength-3"></div>
<div class="strength-bar flex-1 rounded-full bg-gray-border" id="strength-4"></div>
</div>
<p class="font-caption text-caption text-gray-muted">
                            Mínimo 8 caracteres, al menos una letra y un número
                        </p>
</div>
</div>
<!-- Terms and Privacy (Subtle Note) -->
<p class="text-caption font-caption text-gray-muted text-center px-sm">
                    Al crear una cuenta, aceptas nuestros <a class="text-secondary hover:underline" href="#">Términos de Servicio</a> y <a class="text-secondary hover:underline" href="#">Política de Privacidad</a>.
                </p>
<!-- CTA -->
<button class="w-full bg-secondary hover:bg-on-secondary-fixed-variant text-white font-label-md py-md rounded-xl transition-all duration-200 active:scale-[0.98] shadow-sm hover:shadow-md" type="submit">
                    Crear cuenta
                </button>
</form>
<footer class="mt-xl pt-lg border-t border-gray-border text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    ¿Ya tienes cuenta? 
                    <a class="text-secondary font-bold hover:underline" href="#">Iniciar sesión</a>
</p>
</footer>
</div>
<!-- Decorative background elements (Kitchen Board Vibe) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 opacity-[0.03] pointer-events-none">
<div class="absolute top-[10%] left-[5%] transform -rotate-12">
<span class="material-symbols-outlined text-[120px]">restaurant</span>
</div>
<div class="absolute bottom-[10%] right-[5%] transform rotate-12">
<span class="material-symbols-outlined text-[100px]">celebration</span>
</div>
</div>
</main>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('password-toggle-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        function updateStrength(value) {
            const bars = [
                document.getElementById('strength-1'),
                document.getElementById('strength-2'),
                document.getElementById('strength-3'),
                document.getElementById('strength-4')
            ];
            
            let score = 0;
            if (value.length >= 8) score++;
            if (/[a-zA-Z]/.test(value)) score++;
            if (/[0-9]/.test(value)) score++;
            if (/[^A-Za-z0-9]/.test(value)) score++;

            const colors = ['bg-gray-border', 'bg-error', 'bg-state-partial', 'bg-state-partial-bought', 'bg-state-bought'];
            const currentColor = colors[score];

            bars.forEach((bar, index) => {
                if (index < score) {
                    bar.className = `strength-bar flex-1 rounded-full ${currentColor}`;
                } else {
                    bar.className = 'strength-bar flex-1 rounded-full bg-gray-border';
                }
            });
        }

        // Form submission animation/feedback
        document.getElementById('registration-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span>';
                btn.classList.replace('bg-secondary', 'bg-state-bought');
                setTimeout(() => {
                    // Placeholder for redirect logic
                    alert('¡Cuenta creada con éxito! Bienvenido a hatsik.');
                    btn.disabled = false;
                    btn.textContent = originalText;
                    btn.classList.replace('bg-state-bought', 'bg-secondary');
                }, 1000);
            }, 1500);
        });
    </script>
</body></html>
