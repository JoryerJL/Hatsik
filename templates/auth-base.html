<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hatsik{% endblock %}</title>

    <!-- Google Fonts: Nunito (headings) + Plus Jakarta Sans (body) + Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (compiled) -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/main.css' %}">

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hatsik-input {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hatsik-input:focus {
            box-shadow: 0 0 0 4px rgba(253, 232, 228, 0.8);
            border-color: var(--color-secondary);
        }
        .btn-active-state:active {
            transform: scale(0.96);
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body class="font-[var(--font-body)] bg-surface text-on-surface min-h-screen flex items-center justify-center p-[var(--space-margin-mobile)]">

    <!-- Messages / Toasts -->
    {% if messages %}
    <div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-2">
        {% for message in messages %}
            {% include "components/_toast.html" with message=message %}
        {% endfor %}
    </div>
    {% endif %}

    <!-- Auth content -->
    <main class="w-full max-w-[440px]">
        {% block content %}{% endblock %}
    </main>

    <!-- HTMX -->
    <script src="{% static 'js/htmx.min.js' %}"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
